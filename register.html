<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQ - Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Register on ResQ</h1>
    <form id="registerForm">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      <input type="text" id="age" placeholder="Age" required>
      <input type="text" id="gender" placeholder="Gender" required>
      <input type="text" id="bloodgrp" placeholder="Blood Group" required>
      <input type="text" id="address" placeholder="Full Address" required>
      <input type="text" id="city" placeholder="City" required>
      <input type="text" id="pincode" placeholder="Pincode" required>
      <input type="text" id="emergency1" placeholder="Emergency Contact 1" required>
      <input type="text" id="emergency2" placeholder="Emergency Contact 2">
      <input type="text" id="medical" placeholder="Any Medical Conditions / Allergies">
      <input type="password" id="password" placeholder="Create Password" required>
      <button type="submit">Register</button>
      <p>Already registered? <a href="index.html">Login</a></p>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
